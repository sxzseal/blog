// Convenience lookup for main.js
RESUME.projectDetails = {};
RESUME.projects.forEach(p => { RESUME.projectDetails[p.id] = p.details; });
window.RESUME = RESUME;

/* ── Render functions ── */

function renderHero() {
  const label = document.querySelector('.hero-label');
  const name  = document.querySelector('.hero-name');
  const cta   = document.querySelector('.hero-cta');
  if (label) label.innerHTML = `<span class="hero-label-icon">${ICONS.terminal}</span>${RESUME.hero.label}`;
  if (name)  name.textContent = RESUME.hero.name;
  if (cta) {
    cta.innerHTML = RESUME.hero.cta.map(c =>
      `<a href="${c.href}" class="btn-magnetic${c.primary ? ' btn-primary' : ''}">${c.label}</a>`
    ).join('');
  }
}

function renderAbout() {
  const section = document.getElementById('about');
  if (!section) return;
  const statsHTML = RESUME.about.stats.map(s => `
    <div class="stat-card">
      <div class="stat-icon">${ICONS[s.icon] || ''}</div>
      <div class="stat-number"${s.count != null ? ` data-count="${s.count}"` : ''}>${s.display != null ? s.display : '0'}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');
  section.innerHTML = `
    <div class="section-header"><span class="section-number">01</span><h2 class="section-title"><span class="section-title-icon">${ICONS.user}</span>关于我</h2></div>
    <p class="about-text">${RESUME.about.text}</p>
    <div class="about-stats">${statsHTML}</div>`;
}

function renderSkills() {
  const section = document.getElementById('skills');
  if (!section) return;
  const rowsHTML = RESUME.skills.map((cat, i) => {
    const tags = cat.items.map(s =>
      `<span class="skill-tag" data-level="${s.level}">${s.name}</span>`
    ).join('');
    const rev = i === 1 ? ' marquee-track--reverse' : '';
    return `
      <div class="marquee-row">
        <div class="marquee-label"><span class="marquee-label-icon">${ICONS[cat.icon] || ''}</span>${cat.title}</div>
        <div class="marquee-viewport">
          <div class="marquee-track${rev}">
            <div class="marquee-group">${tags}</div>
            <div class="marquee-group" aria-hidden="true">${tags}</div>
          </div>
        </div>
      </div>`;
  }).join('');
  section.innerHTML = `
    <div class="section-header"><span class="section-number">04</span><h2 class="section-title"><span class="section-title-icon">${ICONS.cpu}</span>技能</h2></div>
    <div class="skills-marquee">${rowsHTML}</div>`;
}

function renderExperience() {
  const section = document.getElementById('experience');
  if (!section) return;
  const timelineHTML = RESUME.experience.map(e => `
    <div class="timeline-item">
      <div class="timeline-period">${e.period}</div>
      <div class="timeline-company">${e.company}</div>
      <div class="timeline-role"><span class="role-icon">${ICONS[e.roleIcon] || ''}</span>${e.role}</div>
      <div class="timeline-desc">${e.desc}</div>
    </div>`).join('');
  section.innerHTML = `
    <div class="section-header"><span class="section-number">02</span><h2 class="section-title"><span class="section-title-icon">${ICONS.briefcase}</span>工作经历</h2></div>
    <div class="timeline">${timelineHTML}</div>`;
}

function renderProjects() {
  const section = document.getElementById('projects');
  if (!section) return;
  const cardsHTML = RESUME.projects.map(p => `
    <div class="bento-card${p.wide ? ' bento-card--wide' : ''}" data-project="${p.id}" data-theme="${p.theme}">
      <div class="bento-card__glow"></div>
      <div class="project-icon">${ICONS[p.icon] || p.icon}</div>
      <div class="project-name">${p.name}</div>
      <div class="project-desc">${p.desc}</div>
      <div class="project-tech">${p.tech.map(t => `<span>${t}</span>`).join('')}</div>
    </div>`).join('');
  section.innerHTML = `
    <div class="section-header"><span class="section-number">03</span><h2 class="section-title"><span class="section-title-icon">${ICONS.grid}</span>项目经验</h2></div>
    <div class="bento-grid" id="projectsBento">${cardsHTML}</div>`;
}

function renderContact() {
  const section = document.getElementById('contact');
  if (!section) return;
  const gridHTML = RESUME.contact.map(c => `
    <div class="contact-item"${c.copy ? ` data-copy="${c.copy}"` : ''}>
      <div class="contact-icon">${ICONS[c.icon] || c.icon}</div>
      <div><div class="contact-label">${c.label}</div><div class="contact-value">${c.value}</div></div>
      ${c.copy ? `<button class="copy-btn" title="复制"><span class="copy-icon">${ICONS.copy}</span><span class="check-icon">${ICONS.check}</span></button>` : ''}
    </div>`).join('');
  section.innerHTML = `
    <div class="section-header"><span class="section-number">05</span><h2 class="section-title"><span class="section-title-icon">${ICONS.messageCircle}</span>联系方式</h2></div>
    <div class="contact-grid">${gridHTML}</div>`;
}

function renderFooter() {
  const fp = document.querySelector('.footer p');
  if (fp) fp.innerHTML = `© 2026 个人博客 · Built with <span class="footer-heart">${ICONS.heart}</span> &amp; code`;
}

renderHero();
renderAbout();
renderSkills();
renderExperience();
renderProjects();
renderContact();
renderFooter();
</script>
</head>
